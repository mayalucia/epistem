aburaya_analogue: wanderer
aburaya_notes: >
  Not bound to territory. Carries knowledge or disruption across
  jurisdictions. Maps to a spirit whose practice applies across modules
  rather than guarding one. The social valence differs — traditional
  joginis are often dangerous or marginal, while the Aburaya wanderer
  is a valued contributor.

diagnostic: >
  Boundary-crossing, inter-regional communication. The jogini assembly
  gathers spirits from Lahaul, Chamba, and Tibet — encoding knowledge
  of cross-regional relationships and dangers.

sources:
  - "Diserens, Yoginis of the Upper Kullu Valley, 1991"
