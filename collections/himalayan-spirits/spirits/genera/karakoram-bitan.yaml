    gloss: related trance practitioner meeting pari through music
    landscape: [village]

notable_instances: []

aburaya_analogue: medium
aburaya_notes: >
  The bitan is the Karakoram equivalent of the gur and the lha-pa —
  a human vessel through which spirits communicate. The juniper smoke
  and music are the induction protocol; the pari are the entities
  contacted. Maps directly to medium/harness.

diagnostic: >
  Healing, soothsaying, community guidance. The bitan's trance
  provides diagnosis and prescription in the same manner as the
  Kullu gur's aavesh. The political function (apparatus of the
  former Hunza state) parallels the devta's juridical role.

sources:
  - "Sidky, Shamans and Mountain Spirits in Hunza, Asian Ethnology"
  - "Sidky, Flying with the Vanishing Fairies (ResearchGate)"
