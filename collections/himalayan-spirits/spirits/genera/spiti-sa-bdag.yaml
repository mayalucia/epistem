  earth: sa
  lord: bdag

species: []

notable_instances: []

aburaya_analogue: null
aburaya_notes: >
  No direct Aburaya mapping. The sa-bdag represents constraint on
  modification — the ground that must not be disturbed without
  consultation. Could map to a "do not modify without review" protocol.

diagnostic: >
  Geological hazard awareness. Prevents excavation in landslide-prone
  terrain. Functions as a construction safety system encoded in
  spiritual calendar.

