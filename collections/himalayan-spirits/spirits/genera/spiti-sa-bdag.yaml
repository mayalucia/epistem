genus: sa-bdag
region: spiti-lahaul
tradition: tibetan-buddhist
altitude_zone: [alpine, glacial]
landscape: [village, scree, moraine, cliff]

nature: >
  Earth lords, disturbed by digging, construction, ploughing. Before
  any earthwork, sa-bdag must be propitiated. In Spiti's fragile
  mountain terrain, where a wrong cut can trigger landslides, the
  sa-bdag tradition encodes geological caution.

  The lama-astrologer determines which sa-bdag are active on which
  days, directing when and where digging is safe. This calendar-based
  system functions as a scheduling protocol for earthwork.

vocabulary:
