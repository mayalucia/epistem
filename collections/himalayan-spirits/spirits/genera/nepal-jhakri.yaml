aburaya_analogue: medium
aburaya_notes: >
  The jhākri is the Nepali medium — structurally parallel to gur and
  lha-pa. The dhami/jhankri distinction adds nuance: the dhami is a
  pure vessel (like the gur), while the jhankri uses own powers
  directly (a more autonomous agent). The Aburaya medium could learn
  from this spectrum.

diagnostic: >
  Illness attribution and healing. The jhākri identifies which spirit
  causes illness, negotiates or drives it out. Also community guidance,
  agricultural timing, and social mediation. The diagnostic function
  is primary.

sources:
  - "Peters, Ecstasy and Healing in Nepal, 1981"
  - "Maskarinec, The Rulings of the Night, 1995"
  - "Holmberg, Order in Paradox, 1989"
  - "Cultural Survival: Among Spirits and Deities"
