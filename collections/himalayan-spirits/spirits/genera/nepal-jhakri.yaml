genus: jhakri
region: nepal
tradition: hindu-buddhist-shamanistic
altitude_zone: [valley-floor, alpine]
landscape: [village, forest, shrine]

nature: >
  Central shamanic practitioner of Nepal. The jhākri enters trance
  through drumming (dhyangro, a flat drum), diagnoses illness by
  identifying the responsible spirit, and negotiates with spirits on
  behalf of the patient. Sessions can last hours, often at night.

  Nepal's shamanic landscape is characterised by terminological and
  functional pluralism: dhami (western, possessed medium), jhankri
  (eastern, direct-power healer), bombo (Tamang shaman), mata (female
  healer), lama (Buddhist tantric specialist), jyotishi (astrologer-
  healer). The dhami serves as vehicle of the god; the jhankri
  operates more autonomously using own powers.

  Peters (1981) documented Tamang shamanic initiation in four stages,
  each representing higher achievement. The calling begins when the
  initiate is overwhelmed by anxiety and begins to shake — "crazy
  possession." Maskarinec (1995) showed that shaman oral texts
  (mantras, chants, magical formulas) carry distinct semantic messages
  constituting a coherent cosmological system.

